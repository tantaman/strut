allowBuilds:
  # Transitive-only, via better-auth's OPTIONAL Prisma adapter peer. Strut uses the better-sqlite3/D1
  # (Kysely) path, never Prisma — nothing imports @prisma/client — so its postinstall (prisma generate)
  # must NOT run. `false` silences pnpm's "ignored builds" prompt without building an unused client.
  '@prisma/client': false
  better-sqlite3: true
  esbuild: true
  lightningcss: true
  sharp: false
  unrs-resolver: true
  workerd: true
minimumReleaseAgeExclude:
  - '@rindle/api-server@0.4.3'
  - '@rindle/cli-darwin-arm64@0.4.3'
  - '@rindle/cli-darwin-x64@0.4.3'
  - '@rindle/cli-linux-arm64-gnu@0.4.3'
  - '@rindle/cli-linux-arm64-musl@0.4.3'
  - '@rindle/cli-linux-x64-gnu@0.4.3'
  - '@rindle/cli-linux-x64-musl@0.4.3'
  - '@rindle/cli-win32-x64-msvc@0.4.3'
  - '@rindle/cli@0.4.3'
  - '@rindle/client@0.4.3'
  - '@rindle/daemon-client@0.4.3'
  - '@rindle/devtools@0.4.3'
  - '@rindle/normalized@0.4.3'
  - '@rindle/optimistic@0.4.3'
  - '@rindle/query-compiler@0.4.3'
  - '@rindle/react-devtools@0.4.3'
  - '@rindle/react@0.4.3'
  - '@rindle/remote@0.4.3'
  - '@rindle/wasm@0.4.3'
  - '@rindle/narrator@0.4.3'
